name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # HeroUI Pro (@heroui-pro/react) is a licensed package — its postinstall
      # downloads artifacts using the CI/CD token from repo secrets.
      - name: Install dependencies
        run: npm ci
        env:
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}

      # Builds the app, signs the updater artifacts, creates a draft GitHub
      # Release, and uploads the DMG + WorkNeat.app.tar.gz(.sig) + latest.json.
      - name: Build, sign & publish (draft)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: WorkNeat ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target aarch64-apple-darwin
